apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: ${collector_id}
  namespace: ${namespace}
spec:
  mode: statefulset
  # Operator manages a ServiceMonitor for this collector's :8888 internal telemetry
  # (discovered by the prometheusCR TA) and stops auto-injecting prometheus.io/scrape
  # pod annotations -> single deterministic discovery path, no annotation/SM overlap.
  observability:
    metrics:
      enableMetrics: true
      disablePrometheusAnnotations: true
  image: otel/opentelemetry-collector-contrib:0.152.0
  targetAllocator:
    enabled: true
    image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.152.0
    replicas: 1
    prometheusCR:
      enabled: true
      # SINGLE cluster-wide prometheusCR plane: discovers ALL ServiceMonitors (loki, mimir/*,
      # kube-state-metrics, node-exporter, cert-manager, ...). No tier label to reason about —
      # there is no second CRD-discovering TA to partition against. `{}` = match all.
      serviceMonitorSelector: {}
    serviceAccount: ${service_account}
  serviceAccount: ${service_account}
  volumes:
    - name: internal-ca-volume
      secret:
        secretName: otel-internal-ca-secret
        defaultMode: 444

  volumeMounts:
    - name: internal-ca-volume
      mountPath: /etc/otel/certs/
      readOnly: true
  resources:
    requests:
      cpu: 100m
      memory: 750Mi
    limits:
      cpu: 1
      memory: 5Gi
  autoscaler:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 70
  env:
    - name: GOMEMLIMIT
      value: "4250MiB"
    - name: "K8S_NODE_NAME"
      valueFrom:
        fieldRef:
          fieldPath: "spec.nodeName"
    - name: "K8S_POD_NAME"
      valueFrom:
        fieldRef:
          fieldPath: "metadata.name"
    - name: "K8S_NAMESPACE"
      valueFrom:
        fieldRef:
          fieldPath: "metadata.namespace"
  config:
    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 60s
            scrape_timeout: 10s
          scrape_configs:
          - job_name: kubernetes-apiservers
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            kubernetes_sd_configs:
            - role: endpoints
            relabel_configs:
            - action: keep
              regex: default;kubernetes;https
              source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            scheme: https
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            # apiserver_*/etcd_* (~56% of ingest, ~69k series) — verified unconsumed by any
            # dashboard or ruler rule (2026-06-10). up/scrape_* are synthesized post-scrape and
            # are not affected, so the job stays up=1; workqueue_*/go_*/process_* are kept.
            metric_relabel_configs:
            - source_labels: [__name__]
              regex: (apiserver|etcd)_.*
              action: drop

    extensions:
      headers_setter:
        headers:
          - action: upsert
            key: X-Scope-OrgId
            from_context: X-Scope-OrgId

    processors:
      memory_limiter:
        limit_mib: 4200
        spike_limit_mib: 1000
        check_interval: 1s
      batch/metrics:
        send_batch_max_size: 1000
        timeout: 1s
        send_batch_size: 1000
      attributes:
        actions:
          - key: k8s_cluster_id
            value: ${eks_cluster}
            action: insert
          - key: otel_collector_id
            action: insert
            value: ${collector_id}

      metricstransform:
        transforms:
          - include: ^exported_(.*)$$
            match_type: regexp
            action: update
            new_name: $$${1}
    exporters:
      otlp:
        endpoint: "https://otel.gowthamvandana.com:443"
        tls:
          insecure: false
          insecure_skip_verify: true
        headers:
          X-Scope-OrgId: obsrv
        compression: snappy
    service:
      extensions: [headers_setter]
      telemetry:
        metrics:
          # must be a string (none|basic|normal|detailed); `{}` breaks the operator's
          # telemetry unmarshal and blocks enableMetrics' ServiceMonitor creation.
          level: normal
        logs:
          level: error
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, attributes, metricstransform, batch/metrics]
          exporters: [otlp]
