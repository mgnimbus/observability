apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: ${collector_id}-metrics-stateful
  namespace: ${namespace}
spec:
  mode: statefulset
  observability:
    metrics:
      enableMetrics: true
      disablePrometheusAnnotations: true
  image: otel/opentelemetry-collector-contrib:0.152.0
  targetAllocator:
    enabled: true
    image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.152.0
    replicas: 1
    prometheusCR:
      enabled: true
      serviceMonitorSelector: {}
      # Also discover the log collector's chart-rendered PodMonitor: a daemonset Helm collector
      # renders no Service, so its :8888 self-telemetry is only reachable via a PodMonitor. An
      # absent podMonitorSelector selects NONE, so it must be set explicitly.
      podMonitorSelector: {}
    serviceAccount: ${service_account}
  serviceAccount: ${service_account}
  volumes:
    - name: internal-ca-volume
      secret:
        secretName: otel-internal-ca-secret
        defaultMode: 444
  volumeMounts:
    - name: internal-ca-volume
      mountPath: /etc/otel/certs/
      readOnly: true

  resources:
    requests:
      cpu: 100m
      memory: 750Mi
    limits:
      cpu: 1
      memory: 5Gi
  autoscaler:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 70

  env:
    - name: GOMEMLIMIT
      value: "4250MiB"

  config:
    extensions:
      headers_setter:
        headers:
          - action: upsert
            key: X-Scope-OrgId
            from_context: X-Scope-OrgId

    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 60s
            scrape_timeout: 10s
          scrape_configs:
            - job_name: kubernetes-apiservers
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - action: keep
                  regex: default;kubernetes;https
                  source_labels:
                    - __meta_kubernetes_namespace
                    - __meta_kubernetes_service_name
                    - __meta_kubernetes_endpoint_port_name
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: (apiserver|etcd)_.*
                  action: drop

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 4250
        spike_limit_mib: 850
      batch:
        send_batch_size: 1000
        send_batch_max_size: 1000
        timeout: 1s
      attributes:
        actions:
          - key: k8s_cluster_id
            value: ${eks_cluster}
            action: insert
          - key: otel_collector_id
            action: insert
            value: ${collector_id}

      metricstransform:
        transforms:
          - include: ^exported_(.*)$$
            match_type: regexp
            action: update
            new_name: $$${1}

    exporters:
      otlp:
        endpoint: "${obsrv_domain_name}"
        tls:
          insecure: false
          # CA-pin against the mounted internal CA; set skip_tls_verify=false per cluster to enforce.
          # ca_file: /etc/otel/certs/ca.crt
          insecure_skip_verify: ${skip_tls_verify}
        headers:
          X-Scope-OrgId: ${tenant}
        compression: snappy

    service:
      extensions: [headers_setter]
      telemetry:
        # Distinct service.name -> distinct `job` when :8888 self-telemetry is scraped (the OTel
        # prometheus receiver maps service.name->job; default is otelcol-contrib for every collector).
        resource:
          service.name: ${collector_id}
        metrics:
          level: normal
        logs:
          level: error
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, attributes, metricstransform, batch]
          exporters: [otlp]
