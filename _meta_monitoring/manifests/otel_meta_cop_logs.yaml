mode: "daemonset"

image:
  repository: otel/opentelemetry-collector-contrib

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true
  kubernetesEvents:
    enabled: false # Disabled: Events are cluster-wide, not node-local!

configMap:
  create: true

extraVolumeMounts:
  - name: varlog
    mountPath: /host/var/log
    readOnly: true
  - name: internal-ca-volume
    mountPath: /etc/otel/certs/
    readOnly: true

extraVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: internal-ca-volume
    secret:
      secretName: otel-internal-ca-secret
      defaultMode: 420

resources:
  requests:
    cpu: 200m
    memory: 400Mi
  limits:
    cpu: 1
    memory: 1Gi

useGOMEMLIMIT: true

# Run as root: the filelog file_storage checkpoint lives on a root-owned hostPath (/var/lib/otelcol)
# and the logsCollection preset reads root-owned host logs under /var/log. As the chart's default
# non-root UID the collector can't write the checkpoint ("permission denied" opening
# /var/lib/otelcol/receiver_filelog_). Standard for a node log-collecting daemonset.
securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false

config:
  extensions:
    health_check: {}
    headers_setter:
      headers:
        - action: upsert
          key: X-Scope-OrgId
          from_context: X-Scope-OrgId
  receivers:
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /host/var/log/falcon-*/**
      start_at: end
      include_file_path: true
      include_file_name: true
      operators:
        # 1. Recombine standard CRI line splits (16KB runtime chunking)
        - type: recombine
          id: combine-cri-partials
          combine_field: body
          combine_with: ""
          is_first_entry: body matches "^[^ Z]+Z? (stdout|stderr) F"
          source_identifier: attributes["log.file.path"]

        # 2. Recombine Multi-line App Traces (Java, Python stack frames)
        - type: recombine
          id: combine-app-stacktraces
          combine_field: body
          combine_with: "\n"
          is_first_entry: body matches "^[^ Z]+Z? (stdout|stderr) [A-Z] [^\\sCaused]"
          source_identifier: attributes["log.file.path"]

        # 3. Detect container runtime wrapper
        - type: router
          id: get-format
          routes:
            - output: docker-runtime
              expr: 'body matches "^\\{"'
            - output: crio-runtime
              expr: 'body matches "^[^ Z]+ "'
            - output: containerd-runtime
              expr: 'body matches "^[^ Z]+Z"'

        - type: add
          id: docker-runtime
          field: attributes["container.runtime"]
          value: "docker"
          output: parser-docker
        - type: add
          id: crio-runtime
          field: attributes["container.runtime"]
          value: "crio"
          output: parser-crio
        - type: add
          id: containerd-runtime
          field: attributes["container.runtime"]
          value: "containerd"
          output: parser-containerd

        # Runtime payload parsing extensions
        - type: regex_parser
          id: parser-crio
          regex: "^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
          output: extract_metadata_from_filepath
          timestamp:
            parse_from: attributes.time
            layout_type: gotime
            layout: "2006-01-02T15:04:05.999999999Z07:00"

        - type: regex_parser
          id: parser-containerd
          regex: "^(?P<time>[^ Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$"
          output: extract_metadata_from_filepath
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"

        - type: json_parser
          id: parser-docker
          output: extract_metadata_from_filepath
          timestamp:
            parse_from: attributes.time
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"

        - type: move
          from: attributes.log
          to: body

        # Metadata Mapping
        - type: regex_parser
          id: extract_metadata_from_filepath
          regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
          parse_from: attributes["log.file.path"]

        - type: filter
          id: junk_filter
          expr: 'attributes.container_name matches "^loki-(canary).*$"'

        - type: move
          from: attributes.container_name
          to: resource["k8s.container.name"]
        - type: move
          from: attributes.stream
          to: attributes["log.iostream"]
        - type: move
          from: attributes.namespace
          to: resource["k8s.namespace.name"]
        - type: move
          from: attributes.pod_name
          to: resource["k8s.pod.name"]
        - type: move
          from: attributes.restart_count
          to: attributes["k8s.container.restart_count"]
        - type: move
          from: attributes.uid
          to: resource["k8s.pod.uid"]

        # Adaptive Application Structural Parsing
        - type: json_parser
          id: extract-level-from-json-log
          parse_from: body
          output: parser-level
          if: 'body matches "^{.*}$"'

        - type: regex_parser
          id: parser-level
          regex: "^.*level=(?P<level>[a-zA-Z]+).*$"
          parse_from: body
          if: 'body matches ".*level=.*"'

        - type: move
          from: attributes.level
          to: resource["level"]
          if: 'attributes["level"] != nil'

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 800
      spike_limit_mib: 200

    k8sattributes:
      filter:
        node_from_env_var: $${env:K8S_NODE_NAME}
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name
      extract:
        metadata:
          - k8s.deployment.name
          - k8s.node.name
          - k8s.pod.start_time

    resource:
      attributes:
        - action: upsert
          key: k8s.cluster.id
          value: ${eks_cluster}
        - action: upsert
          key: otel.collector.id
          value: ${collector_id}

    resourcedetection:
      detectors: [env, system, ec2]
      timeout: 2s
      override: false

    filter/noise:
      error_mode: ignore
      logs:
        log_record:
          - "severity_number <= 9" # Drops explicit trace/debug logs cleanly via OTTL

    batch:
      send_batch_max_size: 1500
      timeout: 5s
      send_batch_size: 1000

  exporters:
    otlp:
      endpoint: "${obsrv_domain_name}"
      tls:
        insecure: false
        # CA-pin against the mounted internal CA; set skip_tls_verify=false per cluster to enforce.
        # ca_file: /etc/otel/certs/ca.crt
        insecure_skip_verify: ${skip_tls_verify}
      headers:
        X-Scope-OrgId: ${tenant}
      compression: snappy

  service:
    extensions: [health_check, headers_setter]
    telemetry:
      # Distinct service.name -> distinct `job` (obsrv-logs) when the PodMonitor scrapes :8888;
      # otherwise it collapses onto job=otelcol-contrib with every other collector.
      resource:
        service.name: ${collector_id}
      metrics:
        level: detailed
      logs:
        level: error
    pipelines:
      logs:
        receivers: [filelog]
        processors:
          [
            memory_limiter,
            k8sattributes,
            resourcedetection,
            resource,
            filter/noise,
            batch,
          ]
        exporters: [otlp]

ports:
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# Daemonset Helm collectors render no Service, so a ServiceMonitor never materializes (the chart gates
# Service + ServiceMonitor to deployment/statefulset). Use a PodMonitor — it selects the agent pods
# directly on the metrics port. Discovered by the obsrv-ta TA via podMonitorSelector: {}.
serviceMonitor:
  enabled: false
podMonitor:
  enabled: true
  interval: 60s
  metricsEndpoints:
    - port: metrics
      # Same self-telemetry drop as the operator collectors (see collector-self-servicemonitor.yaml).
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "otelcol_(process_cpu_.+|process_runtime_.+|otelsvc_k8s_.+|processor_internal_duration_seconds.*|processor_batch_metadata_cardinality|exporter_prometheusremotewrite_.+|processor_batch_batch_send_size(_bytes)?_bucket)"
          action: drop
