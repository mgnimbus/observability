# ─────────────────────────────────────────────────────────────────────────────────────────────
# GENERIC — capturing a metric/label you don't see in Mimir
# This meta-monitoring pipeline deliberately TRIMS metrics/labels for low cardinality (no spillage),
# so "it's missing" usually means "we trimmed it", not "it doesn't exist". Don't guess — confirm at
# the SOURCE first, then widen the helm:
#   1. See what the exporter actually exposes (raw, un-trimmed):
#        # node-exporter (host/OS):
#        kubectl -n meta-monitoring port-forward ds/node-exporter-prometheus-node-exporter 9100:9100
#        curl -s localhost:9100/metrics | grep <name>
#        # kubelet / cAdvisor (this collector): curl the node's :10250/metrics or /metrics/cadvisor
#   2. If it's present at the source but absent in Mimir, it was trimmed. Re-enable in the component's
#      helm values (e.g. manifests/node-exporter-values.yaml, manifests/ksm-values.yaml):
#        • disabled collector  -> remove its `--no-collector.<x>` from extraArgs
#        • dropped metric/label -> adjust `prometheus.monitor.metricRelabelings`
#   3. helm diff -> apply -> re-baseline (./baseline.sh) -> confirm the series now appears.
# Keep every collector UNIFORM: one values-file per component, label hygiene once at the gateway.
# ─────────────────────────────────────────────────────────────────────────────────────────────
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: ${collector_id}
  namespace: ${namespace}
spec:
  mode: daemonset
  observability:
    metrics:
      enableMetrics: true
      disablePrometheusAnnotations: true
  image: otel/opentelemetry-collector-contrib:0.152.0
  serviceAccount: ${service_account}
  # Target Allocator explicitly disabled. DaemonSets shard naturally by node.
  targetAllocator:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 500Mi
    limits:
      cpu: 1
      memory: 2Gi
  volumes:
    - name: internal-ca-volume
      secret:
        secretName: otel-internal-ca-secret
        defaultMode: 444
  volumeMounts:
    - name: internal-ca-volume
      mountPath: /etc/otel/certs/
      readOnly: true
  env:
    - name: GOMEMLIMIT
      value: "1600MiB" # ~80% of the 2Gi pod limit
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: HOST_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
  tolerations:
    - effect: NoSchedule
      operator: Exists
  config:
    extensions:
      headers_setter:
        headers:
          - action: upsert
            key: X-Scope-OrgId
            from_context: X-Scope-OrgId

    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 60s
            scrape_timeout: 10s
          scrape_configs:
            # Scrape THIS node's kubelet directly — the daemonset pod knows its own host IP, so no node
            # SD is needed. `role: node` would make every pod watch ALL nodes (N×N watches per cluster
            # ×200 clusters). No node-label `labelmap` either: it stamps every node label onto every
            # kubelet/cadvisor series (large cardinality); the `node` identity is added once via the
            # attributes processor below.
            - job_name: kubernetes-nodes
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true # kubelet serves a node-scoped cert
              metrics_path: /metrics
              static_configs:
                - targets: ["$${env:HOST_IP}:10250"]
              # Drop the apiserver_* (~136 series) the kubelet re-exposes as an API client (escapes the
              # apiservers-job drop; not consumed here). Keep the rest of the kubelet set (volume_stats,
              # runtime ops, ...) for now — a focused kubelet keep-list is a later pass.
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: apiserver_.*
                  action: drop

            - job_name: kubernetes-nodes-cadvisor
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              metrics_path: /metrics/cadvisor
              static_configs:
                - targets: ["$${env:HOST_IP}:10250"]
              # cAdvisor has NO native knob (it's the kubelet's built-in set) -> metric_relabel_configs
              # is the ONLY lever. Default-deny KEEP-list: keep the dashboard-consumed container_* +
              # ruler (container_cpu_usage_seconds_total, container_memory_usage_bytes) + machine_*
              # capacity; drop the firehose (container_tasks_state ~995, container_memory_failures_total
              # ~796, container_blkio_device_usage_total ~306, and the per-container cpu_load/system/
              # memory_rss/cache/mapped/max/kernel/file_descriptors ~199 each). ~12.7k container_ series
              # -> the consumed core. (container_status_*/resource_*/info are recording-rule refs, not
              # cAdvisor-emitted, so they're unaffected.)
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: container_(cpu_usage_seconds_total|cpu_cfs_throttled_seconds_total|memory_working_set_bytes|memory_usage_bytes|network_(receive|transmit)_(bytes|errors|packets|packets_dropped)_total|fs_writes_bytes_total|oom_events_total|spec_cpu_(period|quota)|spec_memory_limit_bytes|log_filesystem_used_bytes)|machine_(cpu_cores|memory_bytes)
                  action: keep

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1500
        spike_limit_mib: 300
      batch:
        send_batch_size: 1000
        send_batch_max_size: 1000
        timeout: 1s
      attributes:
        actions:
          - key: k8s_cluster_id
            value: ${eks_cluster}
            action: insert
          # node identity (replaces the dropped node-label labelmap — just the node name, low cardinality)
          - key: node
            value: "$${env:K8S_NODE_NAME}"
            action: insert
          - key: otel_collector_id
            action: insert
            value: ${collector_id}
      metricstransform:
        transforms:
          - include: ^exported_(.*)$$
            match_type: regexp
            action: update
            new_name: $$${1}

    exporters:
      otlp:
        endpoint: "${obsrv_domain_name}"
        tls:
          insecure: false
          # CA-pin against the mounted internal CA; set skip_tls_verify=false per cluster to enforce.
          # ca_file: /etc/otel/certs/ca.crt
          insecure_skip_verify: ${skip_tls_verify}
        headers:
          X-Scope-OrgId: ${tenant}
        compression: snappy

    service:
      extensions: [headers_setter]
      telemetry:
        resource:
          service.name: ${collector_id}
        metrics:
          level: normal
        logs:
          level: error
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, attributes, metricstransform, batch]
          exporters: [otlp]
