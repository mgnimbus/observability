apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: ${collector_id}
  namespace: ${namespace}
spec:
  mode: daemonset
  # Operator manages a ServiceMonitor for this collector's :8888 internal telemetry
  # (discovered by the prometheusCR TA) and stops auto-injecting prometheus.io/scrape
  # pod annotations -> single deterministic discovery path, no annotation/SM overlap.
  observability:
    metrics:
      enableMetrics: true
      disablePrometheusAnnotations: true
  image: otel/opentelemetry-collector-contrib:0.152.0
  serviceAccount: ${service_account}
  targetAllocator:
    enabled: true
    image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.152.0
    replicas: 1
    allocationStrategy: per-node
    serviceAccount: ${service_account}
    # Per-node allocation for the STATIC node jobs only (kubelet `kubernetes-nodes`,
    # `kubernetes-nodes-cadvisor`). CRD discovery is intentionally NOT enabled here: a single
    # prometheusCR plane lives on the statefulset TA (meta_ta). Two CRD-discovering TAs would
    # need disjoint selectors to avoid double-scrape — one plane removes that whole class of
    # drift, and nothing consumes `otel_collector_id`, so central scraping of KSM/node-exporter
    # via the statefulset is fine.
  resources:
    requests:
      cpu: 50m
      memory: 500Mi
    limits:
      cpu: 1
      memory: 5Gi
  volumes:
    - name: internal-ca-volume
      secret:
        secretName: otel-internal-ca-secret
        defaultMode: 444
  volumeMounts:
    - name: internal-ca-volume
      mountPath: /etc/otel/certs/
      readOnly: true
  env:
    - name: GOMEMLIMIT
      value: "4250MiB"
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
  tolerations:
    - effect: NoSchedule
      operator: Exists
  config:
    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 60s
            scrape_timeout: 10s
          scrape_configs:
            - job_name: kubernetes-nodes
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - replacement: kubernetes.default.svc:443
                  target_label: __address__
                - regex: (.+)
                  replacement: /api/v1/nodes/$$1/proxy/metrics
                  source_labels:
                    - __meta_kubernetes_node_name
                  target_label: __metrics_path__
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
            - job_name: kubernetes-nodes-cadvisor
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - replacement: kubernetes.default.svc:443
                  target_label: __address__
                - regex: (.+)
                  replacement: /api/v1/nodes/$$1/proxy/metrics/cadvisor
                  source_labels:
                    - __meta_kubernetes_node_name
                  target_label: __metrics_path__
                - action: replace
                  source_labels:
                    - __meta_kubernetes_node_name
                  target_label: node
                - action: replace
                  source_labels:
                    - __meta_kubernetes_namespace
                  target_label: namespace
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
    extensions:
      headers_setter:
        headers:
          - action: upsert
            key: X-Scope-OrgId
            from_context: X-Scope-OrgId
    processors:
      batch:
        send_batch_max_size: 1000
        timeout: 1s
        send_batch_size: 1000
      memory_limiter:
        limit_mib: 4200
        spike_limit_mib: 1000
        check_interval: 1s
      attributes:
        actions:
          - key: k8s_cluster_id
            value: ${eks_cluster}
            action: insert
          - key: otel_collector_id
            action: insert
            value: ${collector_id}
      metricstransform:
        transforms:
          - include: ^exported_(.*)$$
            match_type: regexp
            action: update
            new_name: $$${1}
    exporters:
      otlp:
        endpoint: "https://otel.gowthamvandana.com:443"
        tls:
          insecure: false
          insecure_skip_verify: true
          # ca_file: /etc/otel/certs/ca.crt
        headers:
          X-Scope-OrgId: obsrv
        compression: snappy
    service:
      extensions: [headers_setter]
      telemetry:
        metrics:
          # must be a string (none|basic|normal|detailed); `{}` breaks the operator's
          # telemetry unmarshal and blocks enableMetrics' ServiceMonitor creation.
          level: normal
        logs:
          level: error
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, attributes, metricstransform, batch]
          exporters: [otlp]
