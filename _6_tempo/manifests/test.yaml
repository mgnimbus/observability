# tempo-distributed values (dev). Converted from the old single-binary `tempo` chart.
# Release name MUST be "tempo-distributed" so services match the Grafana datasource
# (tempo-distributed-query-frontend:3200) and the OTel collector (tempo-distributed-distributor:4317).

fullnameOverride: ""

# IRSA service account (same role the single-binary used) — supplies S3 credentials.
serviceAccount:
  create: true
  name: tempo-s3
  annotations:
    eks.amazonaws.com/role-arn: ${role_arn}

# Trace storage on S3 (same bucket as before). With IRSA, no access/secret keys needed.
storage:
  trace:
    backend: s3
    s3:
      bucket: meda-dev-mule-loki-ruler
      endpoint: s3.ap-south-2.amazonaws.com
      region: ap-south-2
# RETENTION: intentionally NOT set here. The old single-binary config used
# compactor.compaction.block_retention = 24h; the chart default differs. Set your
# retention policy explicitly (compactor config / overrides) — left out so retention
# isn't changed silently. CONFIRM before relying on it.

# OTLP receivers — the OTel collector pushes OTLP gRPC :4317 / HTTP :4318.
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true

# Dev sizing — one replica per component (chart default ingester replicas is 3).
# Ingester persistence left at chart default (disabled = ephemeral WAL, flushed to S3);
# fine for a throwaway dev cluster, avoids a storageClass dependency.
distributor:
  replicas: 1
ingester:
  replicas: 1
querier:
  replicas: 1
queryFrontend:
  replicas: 1
compactor:
  replicas: 1

# Service graphs / span metrics need the metrics-generator + remote_write to Mimir.
# Disabled for now (no new behavior); to enable, set enabled: true and point remoteWrite
# at Mimir (http://mimir-nginx.mimir.svc.cluster.local/api/v1/push, X-Scope-OrgID: obsrv).
metricsGenerator:
  enabled: false

# Gateway not needed — the Grafana datasource targets query-frontend (:3200) directly.
gateway:
  enabled: false
