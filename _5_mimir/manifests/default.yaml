nameOverride: mimir

fullnameOverride: mimir

image:
  repository: grafana/mimir
  tag: r335-39405cd
  pullPolicy: IfNotPresent

global:
  # -- Definitions to set up nginx resolver
  dnsService: kube-dns
  dnsNamespace: kube-system
  clusterDomain: cluster.local.

serviceAccount:
  create: true
  name: ${service_account_name}
  annotations:
    eks.amazonaws.com/role-arn: ${role_arn}

mimir:
  structuredConfig:
    enable_go_runtime_metrics: true
    multitenancy_enabled: true
    usage_stats:
      enabled: false
      installation_mode: helm
    blocks_storage:
      backend: s3
      s3:
        bucket_name: ${mimir_chunks_bucket}
        insecure: false
        endpoint: s3.ap-south-2.amazonaws.com
    # Ruler rule groups persist to object storage (NOT local FS — the ruler pod has a
    # read-only root filesystem). Same bucket as blocks, distinct storage_prefix so the
    # two don't collide (Mimir refuses to start on same bucket + same prefix).
    ruler_storage:
      backend: s3
      storage_prefix: ruler
      s3:
        bucket_name: ${mimir_chunks_bucket}
        insecure: false
        endpoint: s3.ap-south-2.amazonaws.com
    frontend:
      log_queries_longer_than: 10s
      grpc_client_config:
        grpc_compression: snappy
    store_gateway:
      sharding_ring:
        replication_factor: 1
    ingester:
      instance_limits:
        max_ingestion_rate: 0
      ring:
        replication_factor: 1
        final_sleep: 0s
        num_tokens: 512
    ingester_client:
      grpc_client_config:
        grpc_compression: snappy
        max_recv_msg_size: 104857600
        max_send_msg_size: 104857600
    server:
      log_level: warn
      grpc_server_max_concurrent_streams: 1000
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600
    limits:
      ingestion_rate: 80000
      max_global_series_per_metric: 0
      max_global_series_per_user: 0
      max_label_names_per_series: 100
      # mimir-mixin recording groups (mimir_querier_api, mimir_ingester_queries) ship 21
      # rules/group, over Mimir's default of 20. Raise the cap (bounds rules/group only —
      # not ingestion or series). Tenant-wide (multitenancy on).
      ruler_max_rules_per_rule_group: 30
      align_queries_with_step: true
      compactor_blocks_retention_period: 3h
    memberlist:
      abort_if_cluster_join_fails: false
      compression_enabled: true
    ruler:
      query_frontend:
        grpc_client_config:
          grpc_compression: snappy
    query_scheduler:
      grpc_client_config:
        grpc_compression: snappy
    alertmanager:
      alertmanager_client:
        grpc_compression: snappy

alertmanager:
  enabled: false
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 20m
  persistentVolume:
    enabled: true
    name: storage
    storageClass: obsrv-sc
    size: 10Gi
  # extraVolumes:
  #   - name: otel-ca-volume
  #     configMap:
  #       name: otel-collector-ca
  #       items:
  #         - key: ca.crt
  #           path: ca.crt
  # extraVolumeMounts:
  #   - name: otel-ca-volume
  #     mountPath: /etc/otel/certs
  #     readOnly: true

compactor:
  persistentVolume:
    enabled: true
    name: storage
    storageClass: obsrv-sc
    size: 10Gi
    enableRetentionPolicy: false
    whenDeleted: Delete
  resources:
    requests:
      cpu: 20m

distributor:
  resources:
    requests:
      cpu: 20m

ingester:
  replicas: 2
  persistentVolume:
    enabled: true
    name: storage
    storageClass: obsrv-sc
    size: 10Gi
    whenDeleted: Delete
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 20m

overrides_exporter:
  resources:
    requests:
      cpu: 20m

querier:
  replicas: 1
  resources:
    requests:
      cpu: 20m

query_frontend:
  resources:
    requests:
      cpu: 20m

query_scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 20m

ruler:
  resources:
    requests:
      cpu: 20m

store_gateway:
  persistentVolume:
    enabled: true
    name: storage
    storageClass: obsrv-sc
    size: 10Gi
    whenDeleted: Delete
  replicas: 2
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 20m

rollout_operator:
  resources:
    requests:
      cpu: 20m

minio:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: true
    interval: 60s
