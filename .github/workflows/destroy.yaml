name: EKS Destroy
run-name: "Destroy infrastructure by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type 'DESTROY' to confirm"
        required: true
        type: string

env:
  AWS_REGION: ap-south-2
  TF_VERSION: 1.12.2

# Shares one group with deploy.yaml so a destroy can never overlap a deploy on the same
# S3 state. Never cancel mid-destroy.
concurrency:
  group: terraform-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Validate confirmation
  validate:
    name: "Validate Destroy Confirmation"
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. You must type 'DESTROY' to proceed."
            exit 1
          fi
          echo "✅ Destruction confirmed"

  # Destroy monitoring first (reverse order)
  destroy-monitoring:
    name: "Destroy Monitoring Stack"
    needs: validate
    runs-on: ubuntu-latest
    env:
      # _2_grafana now requires grafana_admin_password (no default) — provide it so the
      # grafana destroy leg doesn't fail on a missing variable. Harmless to other legs.
      TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
    strategy:
      fail-fast: false # don't cancel siblings mid-destroy (orphans .tflock objects)
      matrix:
        component:
          - meta-monitoring
          - otel-collector
          - otel-operator
          - grafana
          - loki
          - mimir
          - nginx-ingress
          - crd
        include:
          - component: meta-monitoring
            directory: ./_meta_monitoring
          - component: otel-collector
            directory: ./_8_otel_collector
          - component: otel-operator
            directory: ./_7_otel_operator
          - component: grafana
            directory: ./_2_grafana
          - component: loki
            directory: ./_4_loki
          - component: mimir
            directory: ./_5_mimir
          - component: nginx-ingress
            directory: ./_1.2.2_nginx_ingress
          # crd destroyed last — removing the CRD cascades its ScrapeConfig instances
          - component: crd
            directory: ./_1.3_crd
      max-parallel: 1 # Sequential to respect dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get EKS cluster name
        id: cluster
        run: |
          cd _1_eks
          terraform init
          echo "name=$(terraform output -raw cluster_name 2>/dev/null || echo 'cluster-not-found')" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        if: steps.cluster.outputs.name != 'cluster-not-found'
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.cluster.outputs.name }}

      - name: Destroy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "💥 Destroying ${{ matrix.component }}"
          terraform init
          terraform destroy -lock-timeout=5m -auto-approve || echo "⚠️ Component may already be destroyed"

  # Destroy secondary infrastructure (Cert + LoadBalancer)
  destroy-secondary:
    name: "Destroy Secondary Infrastructure"
    needs: destroy-monitoring
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # don't cancel siblings mid-destroy (orphans .tflock objects)
      matrix:
        component:
          - cert
          - loadbalancer
        include:
          - component: cert
            directory: ./_1.4_cert
          - component: loadbalancer
            directory: ./_1.2.1load_balancer
      max-parallel: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Destroy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "💥 Destroying ${{ matrix.component }}"
          terraform init
          terraform destroy -lock-timeout=5m -auto-approve || echo "⚠️ Component may already be destroyed"

  # Destroy primary infrastructure (EKS + Backend)
  destroy-core:
    name: "Destroy Core Infrastructure"
    needs: [destroy-monitoring, destroy-secondary]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # don't cancel siblings mid-destroy (orphans .tflock objects)
      matrix:
        component:
          - backend
          - eks
        include:
          - component: backend
            directory: ./_3_s3_backend
          - component: eks
            directory: ./_1_eks
      max-parallel: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Destroy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "💥 Destroying ${{ matrix.component }}"
          terraform init

          if [ "${{ matrix.component }}" == "backend" ]; then
            echo "⚠️ Skipping backend destruction (Terraform state preserved)"
            exit 0
          fi

          terraform destroy -lock-timeout=5m -auto-approve || echo "⚠️ Component may already be destroyed"

  # Summary
  summary:
    name: "Destruction Summary"
    needs: [destroy-monitoring, destroy-secondary, destroy-core]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Destruction Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring Stack**: ${{ needs.destroy-monitoring.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Secondary Infrastructure**: ${{ needs.destroy-secondary.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Core Infrastructure (EKS + Backend)**: ${{ needs.destroy-core.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Infrastructure destroyed by @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
