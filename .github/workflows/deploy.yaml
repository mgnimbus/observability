name: EKS Deploy
run-name: "Deploy infrastructure by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      deploy_monitoring:
        description: "Include monitoring stack?"
        required: true
        default: true
        type: boolean

env:
  AWS_REGION: ap-south-2
  TF_VERSION: 1.12.2

concurrency:
  group: terraform-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # 1. Primary Infrastructure + CRDs (Enforced Sequential Order)
  primary-infrastructure:
    name: "Deploy Primary Infrastructure"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [eks, crd, backend]
        include:
          - component: eks
            directory: ./_1_eks
          - component: crd
            directory: ./_1.3_crd
          - component: backend
            directory: ./_3_s3_backend
      max-parallel: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Update kubeconfig (if CRD)
        if: matrix.component == 'crd'
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"

      - name: Deploy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "🚀 Deploying ${{ matrix.component }}"
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # 2. Secondary Infrastructure
  secondary-infrastructure:
    name: "Deploy Secondary Infrastructure"
    needs: primary-infrastructure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [loadbalancer, cert]
        include:
          - component: loadbalancer
            directory: ./_1.2.1load_balancer
          - component: cert
            directory: ./_1.4_cert
      max-parallel: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get EKS cluster name
        id: cluster
        run: |
          cd _1_eks
          terraform init
          echo "name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.cluster.outputs.name }}

      - name: Deploy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "🚀 Deploying ${{ matrix.component }}"
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 1 — ingress entrypoint
  monitoring-nginx:
    name: "Monitoring · 1 · nginx-ingress"
    needs: secondary-infrastructure
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy nginx-ingress
        working-directory: ./_1.2.2_nginx_ingress
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 2 — storage backends
  monitoring-backends:
    name: "Monitoring · 2 · backends (loki/mimir/tempo)"
    needs: monitoring-nginx
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { component: loki, directory: ./_4_loki }
          - { component: mimir, directory: ./_5_mimir }
          # - { component: tempo, directory: ./_6_tempo }
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 3 — OpenTelemetry
  monitoring-otel:
    name: "Monitoring · 3 · OpenTelemetry"
    needs: monitoring-backends
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy otel-operator
        working-directory: ./_7_otel_operator
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan
      - name: Wait for operator CRDs/webhook to settle
        run: sleep 20
      - name: Deploy otel-collector
        working-directory: ./_8_otel_collector
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 4 — Grafana
  monitoring-grafana:
    name: "Monitoring · 4 · Grafana"
    needs: monitoring-otel
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy grafana
        working-directory: ./_2_grafana
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 5 — meta-monitoring
  monitoring-meta:
    name: "Monitoring · 5 · meta-monitoring"
    needs: monitoring-grafana
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy meta-monitoring
        working-directory: ./_meta_monitoring
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 6 — Observability (Grafana Dashboards via Tunnel)
  monitoring-observability:
    name: "Monitoring · 6 · Observability Dashboards"
    needs: monitoring-meta
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"

      - name: Deploy Dashboards + Rules via Port Forward
        working-directory: ./_9_grafana_dashboards
        env:
          # grafana provider (dashboards) — provider hits the local tunnel below
          TF_VAR_grafana_url: http://localhost:3000
          TF_VAR_grafana_username: admin
          TF_VAR_grafana_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          echo "🔌 Starting tunnels: Grafana :3000 (dashboards) + Mimir :9009 (ruler rules)..."
          kubectl port-forward -n grafana svc/grafana 3000:80 &
          GRAFANA_PID=$!
          kubectl port-forward -n mimir svc/mimir-nginx 9009:80 &
          MIMIR_PID=$!
          # Tear down BOTH tunnels however the step exits (success or failure)
          trap 'kill "$GRAFANA_PID" "$MIMIR_PID" 2>/dev/null || true' EXIT

          echo "⏳ Waiting for both tunnels to answer (max 60s) — replaces the fixed sleep..."
          for i in $(seq 1 30); do
            g=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health || true)
            m=$(curl -s -o /dev/null -w '%{http_code}' -H 'X-Scope-OrgID: obsrv' \
                  http://localhost:9009/prometheus/config/v1/rules || true)
            if [ "$g" = "200" ] && [ "$m" = "200" ]; then
              echo "✅ tunnels ready (grafana=$g mimir=$m)"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ tunnels not ready after 60s (grafana=$g mimir=$m)"; exit 1
            fi
            sleep 2
          done

          echo "📊 Deploying Grafana dashboards + Mimir/Loki recording rules..."
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Summary
  summary:
    name: "Deployment Summary"
    needs:
      - primary-infrastructure
      - secondary-infrastructure
      - monitoring-nginx
      - monitoring-backends
      - monitoring-otel
      - monitoring-grafana
      - monitoring-meta
      - monitoring-observability
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Include Monitoring**: ${{ github.event.inputs.deploy_monitoring }}" >> $GITHUB_STEP_SUMMARY
          echo "**Primary Infrastructure (EKS + CRD + Backend)**: ${{ needs.primary-infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Secondary Infrastructure (LB + Cert)**: ${{ needs.secondary-infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 1 nginx**: ${{ needs.monitoring-nginx.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 2 backends**: ${{ needs.monitoring-backends.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 3 otel**: ${{ needs.monitoring-otel.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 4 grafana**: ${{ needs.monitoring-grafana.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 5 meta**: ${{ needs.monitoring-meta.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 6 dashboards + rules**: ${{ needs.monitoring-observability.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Infrastructure deployed by @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
