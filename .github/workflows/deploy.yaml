name: EKS Deploy
run-name: "Deploy infrastructure by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      deploy_monitoring:
        description: "Include monitoring stack?"
        required: true
        default: true
        type: boolean

env:
  AWS_REGION: ap-south-2
  TF_VERSION: 1.12.2

# Serialize all Terraform runs (deploy + destroy share this group) so two runs never
# touch the same S3 state at once. Never cancel a run mid-apply — a SIGKILL'd apply is
# what leaves orphaned .tflock objects behind.
concurrency:
  group: terraform-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Deploy EKS and backend first
  primary-infrastructure:
    name: "Deploy Primary Infrastructure"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one failed leg must not cancel siblings mid-apply (orphans locks)
      matrix:
        component: [eks, backend]
        include:
          - component: eks
            directory: ./_1_eks
          - component: backend
            directory: ./_3_s3_backend
      max-parallel: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Deploy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "🚀 Deploying ${{ matrix.component }}"

          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Deploy secondary infrastructure (load balancer + cert)
  secondary-infrastructure:
    name: "Deploy Secondary Infrastructure"
    needs: primary-infrastructure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one failed leg must not cancel siblings mid-apply (orphans locks)
      matrix:
        component: [loadbalancer, cert]
        include:
          - component: loadbalancer
            directory: ./_1.2.1load_balancer
          - component: cert
            directory: ./_1.4_cert
      max-parallel: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get EKS cluster name
        id: cluster
        run: |
          cd _1_eks
          terraform init
          echo "name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.cluster.outputs.name }}

      - name: Deploy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          echo "🚀 Deploying ${{ matrix.component }}"

          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # ── Monitoring stack — deployed in STRICT STAGES, each waiting for the previous ──
  #   0 CRDs → 1 nginx-ingress → 2 backends (loki/mimir) → 3 otel (operator→collector)
  #   → 4 grafana → 5 meta-monitoring
  # Real ordering comes from `needs:`. The old single matrix + `order`/sleep actually ran
  # everything at once (sleep was a hack); this guarantees dependencies are up first.

  # Stage 0 — CRDs (ScrapeConfig CustomResourceDefinition). No prerequisites; must exist
  # before anything references it. _1.3_crd applies the CRD only.
  monitoring-crd:
    name: "Monitoring · 0 · CRDs"
    needs: secondary-infrastructure
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy CRDs
        working-directory: ./_1.3_crd
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 1 — ingress entrypoint
  monitoring-nginx:
    name: "Monitoring · 1 · nginx-ingress"
    needs: monitoring-crd
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy nginx-ingress
        working-directory: ./_1.2.2_nginx_ingress
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 2 — storage backends (loki + mimir, in parallel)
  # NOTE: tempo (_6_tempo) is left out pending reconciliation — that module is release
  # "tempo" with single-binary values and a `chart = "grafana"` bug, while the Grafana
  # datasource + OTel collector expect a distributed "tempo-distributed". Align the module
  # to one shape, then add `- { component: tempo, directory: ./_6_tempo }` here.
  monitoring-backends:
    name: "Monitoring · 2 · backends (loki/mimir)"
    needs: monitoring-nginx
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { component: loki, directory: ./_4_loki }
          - { component: mimir, directory: ./_5_mimir }
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy ${{ matrix.component }}
        working-directory: ${{ matrix.directory }}
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 3 — OpenTelemetry: operator first, then collector (collector needs the operator's CRDs)
  monitoring-otel:
    name: "Monitoring · 3 · OpenTelemetry"
    needs: monitoring-backends
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy otel-operator
        working-directory: ./_7_otel_operator
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan
      - name: Wait for operator CRDs/webhook to settle
        run: sleep 20
      - name: Deploy otel-collector
        working-directory: ./_8_otel_collector
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 4 — Grafana (datasources point at the stage-2 backends)
  monitoring-grafana:
    name: "Monitoring · 4 · Grafana"
    needs: monitoring-otel
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy grafana
        working-directory: ./_2_grafana
        env:
          # admin password is no longer hardcoded — create the GRAFANA_ADMIN_PASSWORD repo secret
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Stage 5 — meta-monitoring (watches the whole stack; depends on everything above)
  monitoring-meta:
    name: "Monitoring · 5 · meta-monitoring"
    needs: monitoring-grafana
    if: github.event.inputs.deploy_monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Update kubeconfig
        run: |
          cd _1_eks && terraform init
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$(terraform output -raw cluster_name)"
      - name: Deploy meta-monitoring
        working-directory: ./_meta_monitoring
        run: |
          terraform init
          terraform plan -lock-timeout=5m -out=tfplan
          terraform apply -lock-timeout=5m -auto-approve tfplan

  # Summary
  summary:
    name: "Deployment Summary"
    needs:
      - primary-infrastructure
      - secondary-infrastructure
      - monitoring-crd
      - monitoring-nginx
      - monitoring-backends
      - monitoring-otel
      - monitoring-grafana
      - monitoring-meta
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Include Monitoring**: ${{ github.event.inputs.deploy_monitoring }}" >> $GITHUB_STEP_SUMMARY
          echo "**Primary Infrastructure (EKS + Backend)**: ${{ needs.primary-infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Secondary Infrastructure (LB + Cert)**: ${{ needs.secondary-infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 0 CRDs**: ${{ needs.monitoring-crd.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 1 nginx**: ${{ needs.monitoring-nginx.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 2 backends**: ${{ needs.monitoring-backends.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 3 otel**: ${{ needs.monitoring-otel.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 4 grafana**: ${{ needs.monitoring-grafana.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring · 5 meta**: ${{ needs.monitoring-meta.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Infrastructure deployed by @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
